name: Release Pipeline

# Este flujo SOLO se dispara cuando creas un tag de versión (ej. v1.0.0)
on:
  push:
    tags:
      - 'v*.*.*'

# Permiso necesario para que el bot de GitHub pueda crear la página de Release
permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build Static and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build static binary
        run: nix build .#static

      - name: Optimize binary (Strip & UPX)
        run: |
          sudo apt-get update && sudo apt-get install -y binutils upx
          cp result/bin/sptlrx-rs ./sptlrx-rs-portable
          chmod +w ./sptlrx-rs-portable
          strip ./sptlrx-rs-portable
          upx --best --lzma ./sptlrx-rs-portable

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ./sptlrx-rs-portable
          generate_release_notes: true
